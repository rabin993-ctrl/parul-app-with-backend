name: Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Prepare public web assets
        run: bash scripts/prepare-web-public-assets.sh

      - name: Build web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx expo export --platform web

      # Arrange the pre-built dist into Vercel's Build Output API v3 format so
      # we can deploy with --prebuilt and skip Vercel's own build step entirely.
      # This ensures the bundle baked here (with the correct Supabase env vars)
      # is exactly what gets served — Vercel never re-runs expo export on its
      # servers where those secrets are not available.
      - name: Prepare Vercel prebuilt output
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/. .vercel/output/static/
          printf '{"version":3,"routes":[{"handle":"filesystem"},{"src":"/(.*)","dest":"/index.html"}]}' \
            > .vercel/output/config.json

      - name: Deploy to Vercel
        run: npx vercel --prod --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
